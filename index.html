<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Donate Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --font-body: 'Be Vietnam Pro', 'Segoe UI', sans-serif;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem;    --space-6: 1.5rem; --space-8: 2rem;
      --space-10: 2.5rem; --space-12: 3rem;  --space-16: 4rem;
      --radius-sm: 0.375rem; --radius-md: 0.5rem;
      --radius-lg: 0.75rem;  --radius-xl: 1rem;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    :root, [data-theme="dark"] {
      --bg:        #0f0e0c;
      --surface:   #161513;
      --surface-2: #1c1a18;
      --surface-3: #242220;
      --border:    oklch(0.85 0.01 60 / 0.10);
      --text:      #e8e6e2;
      --muted:     #7a7874;
      --faint:     #3e3d3a;
      --accent:    #c8392b;
      --accent-h:  #e04535;
      --accent-dim:#5a1a14;
      --gold:      #d4a017;
      --silver:    #9ba3a8;
      --bronze:    #a0673a;
      --success:   #4a9e5c;
      --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.3);
      --shadow-md: 0 4px 16px oklch(0 0 0 / 0.4);
      --shadow-lg: 0 12px 40px oklch(0 0 0 / 0.5);
    }

    [data-theme="light"] {
      --bg:        #f5f4f0;
      --surface:   #faf9f6;
      --surface-2: #ffffff;
      --surface-3: #f0ede8;
      --border:    oklch(0.3 0.01 60 / 0.10);
      --text:      #1e1c18;
      --muted:     #6b6966;
      --faint:     #c5c3bf;
      --accent:    #c8392b;
      --accent-h:  #a82d21;
      --accent-dim:#fde8e6;
      --gold:      #b8860b;
      --silver:    #708090;
      --bronze:    #8b4513;
      --success:   #2d7a3e;
      --shadow-sm: 0 1px 3px oklch(0.2 0.01 60 / 0.08);
      --shadow-md: 0 4px 16px oklch(0.2 0.01 60 / 0.10);
      --shadow-lg: 0 12px 40px oklch(0.2 0.01 60 / 0.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.6;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font: inherit;
      color: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 860px;
      margin-inline: auto;
      padding-inline: var(--space-4);
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: color-mix(in oklch, var(--bg) 85%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: var(--space-3) 0;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo svg {
      flex-shrink: 0;
    }

    .theme-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      color: var(--muted);
      transition: background var(--transition), color var(--transition);
    }

    .theme-btn:hover {
      background: var(--surface-3);
      color: var(--text);
    }

    .hero {
      padding: var(--space-12) 0 var(--space-8);
      text-align: center;
    }

    .hero-label {
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: var(--space-3);
    }

    .hero-amount {
      font-size: var(--text-2xl);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
      margin-bottom: var(--space-2);
      font-variant-numeric: tabular-nums;
      transition: color var(--transition);
    }

    .hero-amount.bump {
      color: var(--accent);
    }

    .hero-target {
      font-size: var(--text-sm);
      color: var(--muted);
      margin-bottom: var(--space-8);
    }

    .progress-wrap {
      margin-bottom: var(--space-6);
    }

    .progress-bar {
      height: 10px;
      background: var(--surface-3);
      border-radius: var(--radius-full, 9999px);
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      width: 20px;
      height: 100%;
      background: linear-gradient(90deg, transparent, oklch(1 0 0 / 0.25));
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--space-2);
      font-size: var(--text-xs);
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .pct-badge {
      font-weight: 700;
      font-size: var(--text-sm);
      color: var(--accent);
    }

    .milestones {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: var(--space-10);
    }

    .milestone {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-full, 9999px);
      font-size: var(--text-xs);
      color: var(--muted);
      transition: all var(--transition);
    }

    .milestone.unlocked {
      background: var(--accent-dim);
      border-color: color-mix(in oklch, var(--accent) 40%, transparent);
      color: var(--accent-h);
      font-weight: 600;
    }

    .milestone-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
    }

    .stat-label {
      font-size: var(--text-xs);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--space-1);
    }

    .stat-value {
      font-size: var(--text-lg);
      font-weight: 700;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .section-title {
      font-size: var(--text-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: var(--space-4);
    }

    .donors-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-8);
    }

    .donor-row {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    .donor-row:last-child {
      border-bottom: none;
    }

    .donor-row:hover {
      background: var(--surface-2);
    }

    .rank-badge {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      font-weight: 700;
      background: var(--surface-3);
      color: var(--muted);
    }

    .rank-badge.gold {
      background: color-mix(in oklch, var(--gold) 30%, var(--surface-3));
      color: var(--gold);
    }

    .rank-badge.silver {
      background: color-mix(in oklch, var(--silver) 30%, var(--surface-3));
      color: var(--silver);
    }

    .rank-badge.bronze {
      background: color-mix(in oklch, var(--bronze) 30%, var(--surface-3));
      color: var(--bronze);
    }

    .donor-name {
      font-size: var(--text-sm);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .donor-amount {
      font-size: var(--text-sm);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      white-space: nowrap;
    }

    .txn-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-8);
      max-height: 400px;
      overflow-y: auto;
    }

    .txn-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border);
    }

    .txn-row:last-child {
      border-bottom: none;
    }

    .txn-name {
      font-size: var(--text-sm);
      font-weight: 500;
    }

    .txn-desc {
      font-size: var(--text-xs);
      color: var(--muted);
    }

    .txn-right {
      text-align: right;
    }

    .txn-amount {
      font-size: var(--text-sm);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--success);
    }

    .txn-time {
      font-size: var(--text-xs);
      color: var(--faint);
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: var(--space-6) 0;
      margin-bottom: var(--space-8);
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-3);
      font-size: var(--text-xs);
      color: var(--muted);
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      color: var(--muted);
      transition: all var(--transition);
    }

    .refresh-btn:hover {
      background: var(--surface-3);
      color: var(--text);
    }

    .refresh-btn.loading svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface-3) 25%, var(--surface-2) 50%, var(--surface-3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }

    .skeleton-text {
      height: 1em;
      margin-bottom: var(--space-2);
    }

    .skeleton-amount {
      height: 3rem;
      width: 60%;
      margin-inline: auto;
      border-radius: var(--radius-md);
    }

    .skeleton-row {
      height: 52px;
      border-bottom: 1px solid var(--border);
    }

    .error-state {
      text-align: center;
      padding: var(--space-16) var(--space-8);
      color: var(--muted);
    }

    .error-state h3 {
      color: var(--text);
      margin-bottom: var(--space-2);
    }

    .error-state p {
      margin-bottom: var(--space-6);
      font-size: var(--text-sm);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-6);
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: var(--text-sm);
      transition: background var(--transition);
    }

    .btn-primary:hover {
      background: var(--accent-h);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface-3);
      border-radius: 3px;
    }

    @media (max-width: 600px) {
      .stats-row {
        grid-template-columns: 1fr 1fr;
      }

      .hero {
        padding: var(--space-8) 0 var(--space-6);
      }
    }
  </style>
</head>

<body>
<header class="header">
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <svg aria-label="Donate Tracker" viewBox="0 0 32 32" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="8" fill="var(--accent)"/>
          <path d="M16 7 C16 7 8 12 8 18 C8 22.4 11.6 26 16 26 C20.4 26 24 22.4 24 18 C24 12 16 7 16 7Z" fill="white" opacity="0.9"/>
          <path d="M16 11 C16 11 11 14.5 11 18 C11 20.8 13.2 23 16 23 C18.8 23 21 20.8 21 18 C21 14.5 16 11 16 11Z" fill="var(--accent)"/>
        </svg>
        <span>Donate Tracker</span>
      </div>

      <div style="display:flex;gap:var(--space-2)">
        <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <section class="hero">
      <p class="hero-label">Tổng donate</p>

      <div class="hero-amount" id="heroAmount">
        <div class="skeleton skeleton-amount"></div>
      </div>

      <p class="hero-target" id="heroTarget">Đang tải...</p>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>

        <div class="progress-meta">
          <span id="progressLeft">—</span>
          <span class="pct-badge" id="progressPct">0%</span>
        </div>
      </div>

      <div class="milestones" id="milestones"></div>
    </section>

    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">Số dư hiện tại</div>
        <div class="stat-value" id="statCurrentBalance">
          <div class="skeleton skeleton-text" style="width:7rem"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Số giao dịch</div>
        <div class="stat-value" id="statTxnCount">
          <div class="skeleton skeleton-text" style="width:4rem"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Trung bình/GD</div>
        <div class="stat-value" id="statAvg">
          <div class="skeleton skeleton-text" style="width:6rem"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Giao dịch lớn nhất</div>
        <div class="stat-value" id="statMax">
          <div class="skeleton skeleton-text" style="width:6rem"></div>
        </div>
      </div>
    </div>

    <p class="section-title">🏆 Top Donor</p>
    <div class="donors-card" id="donorsCard">
      <div class="skeleton skeleton-row"></div>
      <div class="skeleton skeleton-row"></div>
      <div class="skeleton skeleton-row"></div>
    </div>

    <p class="section-title">🥇 Top 3 Donor</p>
    <div class="donors-card" id="top3DonorsCard">
      <div class="skeleton skeleton-row"></div>
    </div>

    <p class="section-title">💎 Donor trên 5 triệu</p>
    <div class="donors-card" id="over5mDonorsCard">
      <div class="skeleton skeleton-row"></div>
    </div>

    <p class="section-title">🌟 Donor trên 2 triệu</p>
    <div class="donors-card" id="over2mDonorsCard">
      <div class="skeleton skeleton-row"></div>
    </div>

    <p class="section-title">📋 Giao dịch gần nhất</p>
    <div class="txn-list" id="txnList">
      <div class="skeleton skeleton-row"></div>
      <div class="skeleton skeleton-row"></div>
      <div class="skeleton skeleton-row"></div>
      <div class="skeleton skeleton-row"></div>
    </div>

    <footer class="footer">
      <div class="footer-inner">
        <span id="lastUpdate">Chưa tải dữ liệu</span>

        <button class="refresh-btn" id="refreshBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          Refresh
        </button>
      </div>
    </footer>
  </div>
</main>

<script>
const TARGET_MILESTONES = [
  70_000_000,
  100_000_000,
  150_000_000,
  200_000_000,
  270_000_000
];

const root = document.documentElement;

let theme =
  localStorage.getItem("dtTheme") ||
  (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");

root.setAttribute("data-theme", theme);

document.getElementById("themeToggle").addEventListener("click", () => {
  theme = theme === "dark" ? "light" : "dark";
  root.setAttribute("data-theme", theme);
  localStorage.setItem("dtTheme", theme);
  updateThemeIcon();
});

function updateThemeIcon() {
  const btn = document.getElementById("themeToggle");

  btn.innerHTML =
    theme === "dark"
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
}

updateThemeIcon();

const safeNum = (n, fallback = 0) => {
  const x = Number(n);
  return Number.isFinite(x) ? x : fallback;
};

const fmt = (n) =>
  new Intl.NumberFormat("vi-VN").format(Math.round(safeNum(n))) + " đ";

const fmtShort = (n) => {
  const x = safeNum(n);

  if (x >= 1e9) return (x / 1e9).toFixed(1) + " tỷ";
  if (x >= 1e6) return Math.round(x / 1e6) + " tr";

  return new Intl.NumberFormat("vi-VN").format(x);
};

const fmtTime = (s) => {
  if (!s) return "";

  if (
    s === "Hôm nay" ||
    s === "Hôm qua" ||
    /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(String(s))
  ) {
    return s;
  }

  const d = new Date(s);

  if (Number.isNaN(d.getTime())) {
    return String(s);
  }

  return (
    d.toLocaleTimeString("vi-VN", {
      hour: "2-digit",
      minute: "2-digit"
    }) +
    " " +
    d.toLocaleDateString("vi-VN", {
      day: "2-digit",
      month: "2-digit"
    })
  );
};

function animateNumber(el, to, duration = 800) {
  const target = safeNum(to);
  const from = safeNum(el.dataset.val || 0);

  el.dataset.val = target;

  const start = performance.now();

  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);

    el.textContent = fmt(from + (target - from) * ease);

    if (p < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

function rankClass(i) {
  return ["gold", "silver", "bronze"][i] || "";
}

function renderDonorRows(el, donors) {
  if (!Array.isArray(donors) || !donors.length) {
    el.innerHTML = `<div class="error-state"><p>Chưa có giao dịch nào.</p></div>`;
    return;
  }

  el.innerHTML = donors
    .map((d, i) => {
      const rank = d.rank || i + 1;

      return `
        <div class="donor-row">
          <div class="rank-badge ${rankClass(i)}">${rank}</div>
          <div class="donor-name">${d.name || "Ẩn danh"}</div>
          <div class="donor-amount">${fmt(d.amount)}</div>
        </div>
      `;
    })
    .join("");
}

function renderData(d) {
  const totalRaisedAmount = safeNum(d.totalRaisedAmount ?? d.totalAmount);
  const currentBalance = safeNum(d.currentBalance ?? totalRaisedAmount);
  const targetAmount = safeNum(d.targetAmount, 270000000);
  const transactions = Array.isArray(d.transactions) ? d.transactions : [];
  const topDonors = Array.isArray(d.topDonors) ? d.topDonors : [];
  const txnCount = safeNum(d.txnCount);
  const avgAmount = safeNum(d.avgAmount);
  const maxAmount = safeNum(d.maxAmount);

  const heroEl = document.getElementById("heroAmount");
  const prevVal = safeNum(heroEl.dataset.val || 0);

  if (totalRaisedAmount !== prevVal) {
    heroEl.classList.add("bump");
    setTimeout(() => heroEl.classList.remove("bump"), 600);
  }

  animateNumber(heroEl, totalRaisedAmount);

  document.getElementById("heroTarget").textContent =
    `Mục tiêu: ${fmt(targetAmount)}`;

  const pct =
    targetAmount > 0
      ? Math.min(100, (totalRaisedAmount / targetAmount) * 100)
      : 0;

  document.getElementById("progressFill").style.width =
    pct.toFixed(1) + "%";

  document.getElementById("progressPct").textContent =
    pct.toFixed(1) + "%";

  const remaining = Math.max(0, targetAmount - totalRaisedAmount);

  document.getElementById("progressLeft").textContent =
    remaining > 0
      ? `Còn thiếu ${fmt(remaining)}`
      : "🎉 Đã đạt mục tiêu!";

  document.getElementById("milestones").innerHTML = TARGET_MILESTONES.map((m) => `
    <div class="milestone ${totalRaisedAmount >= m ? "unlocked" : ""}">
      <span class="milestone-dot"></span>
      ${fmtShort(m)}
    </div>
  `).join("");

  document.getElementById("statCurrentBalance").textContent =
    fmt(currentBalance);

  document.getElementById("statTxnCount").textContent =
    txnCount.toLocaleString("vi-VN") + " GD";

  document.getElementById("statAvg").textContent =
    fmtShort(avgAmount);

  document.getElementById("statMax").textContent =
    fmtShort(maxAmount);

  renderDonorRows(document.getElementById("donorsCard"), topDonors);

  document.getElementById("txnList").innerHTML = transactions.length
    ? transactions
        .map((t) => `
          <div class="txn-row">
            <div>
              <div class="txn-name">${t.name || "Ẩn danh"}</div>
              <div class="txn-desc">${t.desc || ""}</div>
            </div>

            <div class="txn-right">
              <div class="txn-amount">+${fmt(t.amount)}</div>
              <div class="txn-time">${fmtTime(t.time)}</div>
            </div>
          </div>
        `)
        .join("")
    : `<div style="padding:2rem;text-align:center;color:var(--muted)">Không có giao dịch</div>`;

  document.getElementById("lastUpdate").textContent =
    "Cập nhật: " + new Date().toLocaleTimeString("vi-VN");
}

async function loadTopDonors() {
  try {
    const res = await fetch("/api/top-donors", {
      cache: "no-store"
    });

    if (!res.ok) return;

    const data = await res.json();

    if (!data.success) return;

    renderDonorRows(
      document.getElementById("top3DonorsCard"),
      data.top3 || []
    );

    renderDonorRows(
      document.getElementById("over5mDonorsCard"),
      data.over5m || []
    );

    renderDonorRows(
      document.getElementById("over2mDonorsCard"),
      data.over2m || []
    );
  } catch (err) {
    console.warn("Không tải được /api/top-donors:", err);
  }
}

async function loadData() {
  const refreshBtn = document.getElementById("refreshBtn");
  refreshBtn.classList.add("loading");

  try {
    const res = await fetch("/api/fund-stats", {
      cache: "no-store"
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      throw new Error(data.message || "Lỗi xử lý server");
    }

    renderData(data);
    await loadTopDonors();
  } catch (err) {
    console.error(err);

    document.getElementById("donorsCard").innerHTML = `
      <div class="error-state">
        <h3>Không tải được dữ liệu</h3>
        <p>${err.message}</p>
        <button class="btn-primary" onclick="loadData()">Thử lại</button>
      </div>
    `;

    document.getElementById("lastUpdate").textContent =
      "Lỗi kết nối – " + new Date().toLocaleTimeString("vi-VN");
  } finally {
    refreshBtn.classList.remove("loading");
  }
}

document.getElementById("refreshBtn").addEventListener("click", loadData);

loadData();
setInterval(loadData, 30_000);
</script>
</body>
</html>
